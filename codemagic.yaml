# codemagic.yaml for Capacitor 6 iOS Build (Verification Workflow)
# This workflow is designed to verify the build environment while waiting for Apple Developer approval.

workflows:
  ios-build-workflow:
    name: Capacitor iOS Build (Verification)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: v20.x
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: CocoaPods installation
        script: |
          cd ios/App
          pod install
      - name: Build iOS project (Verify Only - No Signing)
        script: |
          # アプリの署名がまだできないため、ビルドが通るかだけをチェックします
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - osada@jira-chi.net # 通知先のメールアドレス
        notify:
          success: true
          failure: true
