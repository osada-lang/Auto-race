workflows:
  ios-build-workflow:
    name: Capacitor iOS Build (Verification)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Sync Capacitor
        script: |
          # 実行権限を与えてから同期を実行します
          chmod +x node_modules/.bin/cap
          npx cap sync ios
      - name: CocoaPods installation
        script: |
          cd ios/App
          pod install
      - name: Build iOS project (Check Only)
        script: |
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
